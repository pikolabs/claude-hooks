## ============================================================================
## 🔒 PR Secret Scan — Gitleaks
## ============================================================================
##
##  Triggers  │ Pull requests targeting: main · develop · staging
##  Scanner   │ Gitleaks Action v2.3.9 + Gitleaks CLI v8.30.1
##  Scope     │ PR-introduced commits only
##            │ Uses action default:
##            │ --log-opts="--no-merges --first-parent <base>^..<head>"
##  On detect │ Exits non-zero → job fails → merge blocked
##            │ (make this a required status check in branch protection)
##
## ============================================================================

name: PR Secrets Scan using Gitleaks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    name: pr / secrets-scan
    runs-on: ubuntu-24.04

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_VERSION: "8.30.1"
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          
